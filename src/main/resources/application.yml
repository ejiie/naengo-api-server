spring:
  application:
    name: naengo-api-server

  profiles:
    active: local   # 기본 local, 배포 시 SPRING_PROFILES_ACTIVE=prod 로 교체

  autoconfigure:
    # EmbeddingModel 미설정 시 PgVectorStore 자동구성 비활성화 (AI 기능 추가 시 해제)
    exclude: org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

  jpa:
    hibernate:
      # Flyway 가 스키마를 관리하므로 Hibernate 는 검증만 수행 (드리프트 조기 감지)
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

jwt:
  expiration: 86400000          # 24시간 (ms)

# JWT 를 HttpOnly Cookie 로도 주고받기 (2026-05-02 합의, `docs/spec/auth-cookie.md`).
# Authorization 헤더는 모바일 호환을 위해 병행 지원 — JwtAuthenticationFilter 가 헤더 우선, 쿠키 fallback.
auth:
  cookie:
    name: ${AUTH_COOKIE_NAME:NAENGO_AT}
    max-age-seconds: ${AUTH_COOKIE_MAX_AGE:86400}    # JWT 만료와 일치 (24h)
    path: /
    secure: ${AUTH_COOKIE_SECURE:false}              # local: false, prod: true
    same-site: ${AUTH_COOKIE_SAME_SITE:Lax}          # Lax | Strict | None
    domain: ${AUTH_COOKIE_DOMAIN:}                   # 기본 비움 (호스트 한정). 멀티 서브도메인이면 .example.com

oauth:
  kakao:
    user-info-url: https://kapi.kakao.com/v2/user/me
    token-url: https://kauth.kakao.com/oauth/token
    auth-url: https://kauth.kakao.com/oauth/authorize
  google:
    user-info-url: https://www.googleapis.com/oauth2/v3/userinfo

# AWS S3 (이미지 업로드). 버킷/프리픽스가 비어있으면 업로드 엔드포인트는 503 반환.
# 레시피 생성 API 의 `imageUrl` 프리픽스 검증도 이 값이 비어있으면 스킵 (로컬 개발용).
# 실 구현은 SPEC-20260422-05 참조 - 팀원이 AWS 에 버킷 생성한 이후 진행.
aws:
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    bucket: ${AWS_S3_BUCKET:}
    public-url-prefix: ${AWS_S3_PUBLIC_URL_PREFIX:}
    presigned-url-ttl-seconds: 300
    max-content-length: 5242880
    allowed-content-types: image/jpeg,image/png,image/webp
