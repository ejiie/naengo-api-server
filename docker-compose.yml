# 로컬 개발용 PostgreSQL + pgvector.
# 사용: docker compose up -d
# 중지: docker compose down
# 데이터 리셋: docker compose down -v  (볼륨까지 삭제)
#
# 호스트 포트는 5434. 표준 5432 가 로컬 Postgres/다른 프로젝트와 충돌하는 경우가
# 잦아 한 번에 피하기 위함. 컨테이너 내부는 기본 5432 그대로.
# 접속 정보는 application-local.yml 의 기본값과 일치.
# (jdbc:postgresql://localhost:5434/naengo, 사용자/비번 naengo)

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: naengo-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: naengo
      POSTGRES_PASSWORD: naengo
      POSTGRES_DB: naengo
    volumes:
      - naengo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U naengo -d naengo"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  naengo_postgres_data:
